name: Arogya AI API Load & Baseline Performance Test

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 2 * * *' # Daily Load Test at 2 AM UTC
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target API Endpoint URL'
        required: true
        default: 'http://localhost:5000/api/health'
      concurrent_users:
        description: 'Virtual Concurrent Users (VUs)'
        required: true
        default: '100'
      duration_seconds:
        description: 'Test Duration in Seconds'
        required: true
        default: '60'

permissions:
  contents: read
  actions: read

jobs:
  baseline-load-test:
    name: Execute API Load & Baseline Performance Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'arogya_ai_backend/package-lock.json'

      - name: Install Backend Dependencies
        run: |
          cd arogya_ai_backend
          npm ci || npm install

      - name: Start Arogya AI Backend Server
        run: |
          cd arogya_ai_backend
          node server.js &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
          sleep 3

      - name: Verify Backend Server Health Readiness
        run: |
          echo "Checking backend health status on http://localhost:5000/api/health..."
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/api/health || true)
            if [ "$STATUS" = "200" ]; then
              echo "🟢 Backend Server is online and responding with HTTP 200 OK."
              exit 0
            fi
            echo "Waiting for server startup ($i/10)..."
            sleep 2
          done
          echo "❌ Backend server failed to start within timeout."
          exit 1

      - name: Execute 100 VUs / 60-Second Load Test Script
        id: run_load_test
        run: |
          cd arogya_ai_backend
          TARGET_URL="${{ github.event.inputs.target_url || 'http://localhost:5000/api/health' }}"
          VUS="${{ github.event.inputs.concurrent_users || '100' }}"
          DURATION="${{ github.event.inputs.duration_seconds || '60' }}"
          
          echo "🚀 Executing Load Test against $TARGET_URL with $VUS VUs for $DURATION seconds..."
          node baseline_load_test.js "$TARGET_URL" "$VUS" "$DURATION" | tee load_test_output.log

      - name: Publish Load Test Summary to GitHub Action Step Summary
        if: always()
        run: |
          cd arogya_ai_backend
          echo "# ⚡ API Baseline Load Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Execution Timestamp:** $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "**Target Endpoint:** \`${{ github.event.inputs.target_url || 'http://localhost:5000/api/health' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Virtual Users (VUs):** \`${{ github.event.inputs.concurrent_users || '100' }}\` concurrent users" >> $GITHUB_STEP_SUMMARY
          echo "**Duration:** \`${{ github.event.inputs.duration_seconds || '60' }}\` seconds continuous execution" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Performance Output Log" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`text" >> $GITHUB_STEP_SUMMARY
          cat load_test_output.log || echo "No log file found." >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Upload Load Test Logs & Report Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-load-test-report-${{ github.run_number }}
          path: arogya_ai_backend/load_test_output.log
          retention-days: 30
