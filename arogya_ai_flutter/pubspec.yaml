name: arogya_ai
description: A premium multilingual AI-powered healthcare assistance app designed for Indian users.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  google_fonts: ^6.2.1
  animate_do: ^3.3.4
  speech_to_text: ^7.4.0
  flutter_tts: ^3.8.3
  glassmorphism: ^3.0.0
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  google_sign_in: ^6.1.6
  cloud_firestore: ^4.13.6
  firebase_storage: ^11.5.6
  http: ^1.6.0
  url_launcher: ^6.2.5
  image_picker: ^1.0.7
  shared_preferences: ^2.5.5
  google_maps_flutter: ^2.5.3
  geolocator: ^10.1.0
  share_plus: ^13.1.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
